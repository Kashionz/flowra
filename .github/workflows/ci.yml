name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build:web
        env:
          # AI e2e tests need cloud features bundled into the preview build,
          # otherwise the AI trigger renders disabled and ai-*.spec.js times
          # out clicking it. Project ref must match the storage key prefix
          # in e2e/helpers/mockAiAccess.js so the seeded session is picked
          # up; all *.supabase.co requests are intercepted by page.route().
          VITE_SUPABASE_URL: https://hxhcjiiiuknelfsmumcy.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-fake-anon-key-not-a-real-secret

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
